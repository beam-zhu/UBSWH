<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" sizes="192x192" href="https://cdn-icons-png.flaticon.com/512/2271/2271068.png">

    <title>Warehouse V8.7 Double-Check</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        :root { --primary: #1890ff; --success: #52c41a; --danger: #ff4d4f; --bg: #f5f7fa; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); min-height: 100vh; overflow-y: auto; }
        .main-wrapper { display: flex; min-height: 100vh; gap: 10px; padding: 10px; flex-direction: column-reverse; }
        @media (min-width: 900px) { .main-wrapper { flex-direction: row; height: 100vh; overflow: hidden; } }

        .panel-left { flex: 6; background: white; border-radius: 12px; border: 1px solid #e8e8e8; display: flex; flex-direction: column; overflow: hidden; }
        .panel-right { flex: 4; display: flex; flex-direction: column; gap: 10px; }

        .card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #e8e8e8; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        label { font-size: 11px; color: #8c8c8c; font-weight: bold; margin-bottom: 4px; display: block; }
        input { height: 48px; padding: 10px; border: 2px solid #f0f0f0; border-radius: 8px; font-size: 16px; width: 100%; transition: 0.2s; background: #fafafa; }
        input:focus { border-color: var(--primary); outline: none; background: white; }
        input.error-glow { border-color: var(--danger); background-color: #fff1f0; animation: shake 0.3s; }
        
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        
        .file-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 5px; }
        .file-btn { border: 1px dashed #d9d9d9; padding: 5px; border-radius: 6px; text-align: center; font-size: 10px; }
        .status { font-size: 9px; font-weight: bold; color: #bfbfbf; display: block; margin-top: 2px; }
        .ready { color: var(--success); }

        .btn { height: 50px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-save { background: var(--success); color: white; width: 100%; margin-top: 10px; }
        .btn-export { background: var(--primary); color: white; margin: 10px; height: 40px; flex-shrink: 0; }
        .btn-del { background: #ff7875; color: white; height: 30px; width: 45px; font-size: 10px; border-radius: 4px; }

        .table-wrap { flex: 1; overflow-y: auto; padding: 0 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 8px; border-bottom: 1px solid #f0f0f0; text-align: left; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="panel-left">
        <h3 style="padding: 10px 15px 0; margin: 0; font-size: 15px;">PUTWAY LIST (入库单)</h3>
        <div class="table-wrap">
            <table id="mainTable">
                <thead>
                    <tr><th>SKU</th><th>Qty</th><th>Location</th><th>Action</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <button class="btn btn-export" onclick="exportXls()">EXPORT EXCEL</button>
    </div>

    <div class="panel-right">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h4 style="margin:0; color:var(--primary);">DATABASE CONFIG</h4>
                <span id="saveIndicator" style="font-size:10px; color:#ccc;">Auto-save ON</span>
            </div>
            <div class="file-grid">
                <div class="file-btn">
                    <label>1.总库 SKU.CSV</label>
                    <input type="file" id="skuFile" accept=".csv" onchange="loadSKU()" style="font-size:8px; width:80px;">
                    <span id="skuStat" class="status">EMPTY</span>
                </div>
                <div class="file-btn">
                    <label>2.当日清单 DAILY.CSV</label>
                    <input type="file" id="checkFile" accept=".csv" onchange="loadCheck()" style="font-size:8px; width:80px;">
                    <span id="checkStat" class="status">EMPTY</span>
                </div>
                <div class="file-btn">
                    <label>3.库位 LOC.CSV</label>
                    <input type="file" id="locFile" accept=".csv" onchange="loadLoc()" style="font-size:8px; width:80px;">
                    <span id="locStat" class="status">EMPTY</span>
                </div>
            </div>
        </div>

        <div class="card">
            <label>OPERATOR</label>
            <input type="text" id="opName" placeholder="Name" onchange="saveLocal()" style="height:40px; margin-bottom:10px;">
            
            <label>SCAN SKU (校对当日清单)</label>
            <input type="text" id="skuIn" autocorrect="off" autocapitalize="characters" inputmode="email" placeholder="Scan SKU">
            
            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 10px; margin-top:10px;">
                <div><label>QTY</label><input type="number" id="qtyIn" inputmode="numeric" value="1"></div>
                <div>
                    <label>LOCATION</label>
                    <input type="text" id="locIn" list="locList" autocorrect="off" autocapitalize="characters" placeholder="Select Loc">
                    <datalist id="locList"></datalist>
                </div>
            </div>
            <button class="btn btn-save" onclick="addEntry()">SAVE RECORD</button>
        </div>
    </div>
</div>

<script>
    let dbMaster = {};     // 总库资料
    let setDailyCheck = new Set(); // 当日清单
    let setLoc = new Set();
    let data = [];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    window.onload = () => {
        const cache = localStorage.getItem('wh_v87_data');
        const op = localStorage.getItem('wh_v87_op');
        if (cache) { data = JSON.parse(cache); render(); }
        if (op) document.getElementById('opName').value = op;
    };

    function beep() {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = 'square'; o.frequency.setValueAtTime(880, audioCtx.currentTime);
        g.gain.setValueAtTime(0.05, audioCtx.currentTime);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.1);
        setTimeout(() => {
            const o2 = audioCtx.createOscillator(); o2.type = 'square';
            o2.frequency.setValueAtTime(880, audioCtx.currentTime);
            o2.connect(g); o2.start(); o2.stop(audioCtx.currentTime + 0.1);
        }, 150);
    }

    function loadSKU() {
        Papa.parse(document.getElementById('skuFile').files[0], {
            header: false, complete: (res) => {
                dbMaster = {};
                res.data.forEach((r, i) => { if(i>0 && r[0]) dbMaster[r[0].trim().toUpperCase()] = {b:r[1]||"", c:r[2]||""}; });
                const st = document.getElementById('skuStat'); st.innerText = "READY: "+Object.keys(dbMaster).length; st.className="status ready";
            }
        });
    }

    function loadCheck() {
        Papa.parse(document.getElementById('checkFile').files[0], {
            header: false, complete: (res) => {
                setDailyCheck.clear();
                res.data.forEach(r => { if(r[0]) setDailyCheck.add(r[0].trim().toUpperCase()); });
                const st = document.getElementById('checkStat'); st.innerText = "LIST: "+setDailyCheck.size; st.className="status ready";
            }
        });
    }

    function loadLoc() {
        Papa.parse(document.getElementById('locFile').files[0], {
            header: false, complete: (res) => {
                setLoc.clear(); const dl = document.getElementById('locList'); dl.innerHTML = "";
                res.data.forEach(r => r.forEach(c => {
                    if(c && c.trim().length > 1) {
                        let v = c.trim().toUpperCase(); setLoc.add(v);
                        let o = document.createElement('option'); o.value = v; dl.appendChild(o);
                    }
                }));
                const st = document.getElementById('locStat'); st.innerText = "LOC: "+setLoc.size; st.className="status ready";
            }
        });
    }

    function addEntry() {
        const sIn = document.getElementById('skuIn'), lIn = document.getElementById('locIn');
        const sv = sIn.value.trim().toUpperCase(), lv = lIn.value.trim().toUpperCase();
        const op = document.getElementById('opName').value.trim();

        if (!sv || !lv || !op) return;

        // --- 核心校验逻辑 ---
        let error = false;
        
        // 1. 校验是否在“当日清单”中
        if (setDailyCheck.size > 0 && !setDailyCheck.has(sv)) {
            sIn.classList.add('error-glow');
            error = true;
        } else {
            sIn.classList.remove('error-glow');
        }

        // 2. 校验库位
        if (!setLoc.has(lv)) {
            lIn.classList.add('error-glow');
            error = true;
        } else {
            lIn.classList.remove('error-glow');
        }

        if (error) { beep(); return; }

        // 从总库获取信息，如果没有，则保留输入的原码
        const masterInfo = dbMaster[sv];
        const finalSKU = masterInfo ? masterInfo.b : sv;
        const finalName = masterInfo ? masterInfo.c : "NOT_IN_MASTER";

        data.unshift({
            id: Date.now(), "SKU": finalSKU, "Name": finalName,
            "BatchSerialNumber": "", "SupplierSKU": "", "ExpiryDate_YYYYMMDD": "",
            "Quantity": document.getElementById('qtyIn').value,
            "Location": "Patiki Warehouse: " + lv,
            "DateReceived_YYYYMMDD": new Date().toISOString().slice(0,10).replace(/-/g, ""),
            "Received": "TRUE", "Operator": op
        });

        render(); saveLocal();
        sIn.value = ""; lIn.value = ""; document.getElementById('qtyIn').value = "1";
        sIn.focus();
    }

    function render() {
        const b = document.querySelector("#mainTable tbody"); b.innerHTML = "";
        data.forEach(d => {
            b.innerHTML += `<tr><td><b>${d.SKU}</b></td><td>${d.Quantity}</td><td>${d.Location.split(': ')[1]}</td>
            <td><button class="btn-del" onclick="del(${d.id})">DEL</button></td></tr>`;
        });
    }

    function del(id) { data = data.filter(x => x.id !== id); render(); saveLocal(); }
    function saveLocal() { 
        localStorage.setItem('wh_v87_data', JSON.stringify(data)); 
        localStorage.setItem('wh_v87_op', document.getElementById('opName').value);
    }
    function exportXls() {
        if (!data.length) return;
        const out = data.map(({id, ...rest}) => rest);
        const ws = XLSX.utils.json_to_sheet(out, {header:["SKU","Name","BatchSerialNumber","SupplierSKU","ExpiryDate_YYYYMMDD","Quantity","Location","DateReceived_YYYYMMDD","Received","Operator"]});
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Putway");
        XLSX.writeFile(wb, `Receipt_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    document.getElementById('skuIn').onkeyup = e => { if(e.key==='Enter') document.getElementById('qtyIn').focus(); };
    document.getElementById('qtyIn').onkeyup = e => { if(e.key==='Enter') document.getElementById('locIn').focus(); };
    document.getElementById('locIn').onkeyup = e => { if(e.key==='Enter') addEntry(); };
</script>
</body>
</html>

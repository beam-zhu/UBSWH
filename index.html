<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Warehouse V8.14 Right-Hand Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root { --primary: #1890ff; --success: #52c41a; --danger: #ff4d4f; --bg: #f5f7fa; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); height: 100vh; overflow: hidden; }
        
        /* 核心布局控制 */
        .main-wrapper { 
            display: flex; 
            flex-direction: column-reverse; /* 手机端：清单在下，输入在上 */
            height: 100vh; 
            padding: 10px; 
            gap: 10px; 
        }
        
        /* 电脑/平板横屏：恢复右手输入模式 */
        @media (min-width: 900px) { 
            .main-wrapper { 
                flex-direction: row; /* 横屏：左清单，右输入 */
            }
            .panel-left { flex: 6; height: 100%; display: flex; flex-direction: column; }
            .panel-right { flex: 4; height: 100%; display: flex; flex-direction: column; }
        }

        .card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #e8e8e8; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 10px; }
        .panel-left { background: white; border-radius: 12px; border: 1px solid #e8e8e8; overflow: hidden; }
        
        label { font-size: 11px; color: #8c8c8c; font-weight: bold; margin-bottom: 4px; display: block; }
        
        /* 输入框加固 */
        input { 
            height: 46px; padding: 10px; border: 2px solid #f0f0f0; border-radius: 8px; 
            font-size: 16px; width: 100%; background: #fafafa; margin-bottom: 10px;
        }
        input:focus { border-color: var(--primary); outline: none; background: white; }
        
        .error-glow { border-color: var(--danger) !important; background-color: #fff1f0 !important; animation: shake 0.2s 2; }
        @keyframes shake { 0%,100% {transform:translateX(0);} 50% {transform:translateX(-5px);} }

        /* 配置区微调 */
        .file-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        .file-btn { border: 1px dashed #ccc; padding: 5px; border-radius: 6px; text-align: center; background: #fff; }
        .status { font-size: 9px; font-weight: bold; color: #bfbfbf; display: block; }
        .ready { color: var(--success); }

        .btn { height: 48px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; width: 100%; }
        .btn-save { background: var(--success); color: white; }
        .btn-export { background: #444; color: white; margin: 10px; height: 40px; width: calc(100% - 20px); }
        
        .table-wrap { flex: 1; overflow-y: auto; padding: 0 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 10px; border-bottom: 1px solid #f0f0f0; text-align: left; }
        th { background: #fafafa; position: sticky; top: 0; z-index: 10; }
        .row-over { background-color: #fff1f0 !important; color: var(--danger); }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="panel-left">
        <h3 style="padding: 12px 15px 5px; margin: 0; font-size: 15px;">PUTWAY LIST 清单预览</h3>
        <div class="table-wrap">
            <table id="mainTable">
                <thead>
                    <tr><th>SKU</th><th>QTY</th><th>LOCATION</th><th>ACT</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <button class="btn btn-export" onclick="exportCsv()">EXPORT CSV (导出模板)</button>
    </div>

    <div class="panel-right">
        <div class="card">
            <label>CONFIG 配置</label>
            <div class="file-grid">
                <div class="file-btn">
                    <label>MASTER</label>
                    <input type="file" id="skuFile" accept=".csv" onchange="loadSKU()" style="width:100%; font-size:8px;">
                    <span id="skuStat" class="status">EMPTY</span>
                </div>
                <div class="file-btn">
                    <label>DAILY</label>
                    <input type="file" id="checkFile" accept=".csv" onchange="loadCheck()" style="width:100%; font-size:8px;">
                    <span id="checkStat" class="status">OPTIONAL</span>
                </div>
                <div class="file-btn">
                    <label>LOC</label>
                    <input type="file" id="locFile" accept=".csv" onchange="loadLoc()" style="width:100%; font-size:8px;">
                    <span id="locStat" class="status">EMPTY</span>
                </div>
            </div>
        </div>

        <div class="card">
            <label>OPERATOR 操作员</label>
            <input type="text" id="opName" placeholder="Name" onchange="saveLocal()">
            
            <label>SCAN SKU 扫描</label>
            <input type="text" id="skuIn" placeholder="Scan SKU" autocorrect="off" autocapitalize="characters" inputmode="email">
            
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <div style="flex: 1;">
                    <label>QTY 数量</label>
                    <input type="number" id="qtyIn" inputmode="numeric" value="1" style="margin-bottom:0;">
                </div>
                <div style="flex: 2;">
                    <label>LOCATION 库位</label>
                    <input type="text" id="locIn" list="locList" placeholder="Loc" autocorrect="off" autocapitalize="characters" style="margin-bottom:0;">
                    <datalist id="locList"></datalist>
                </div>
            </div>
            
            <button class="btn btn-save" onclick="addEntry()">SAVE RECORD 保存</button>
        </div>
    </div>
</div>

<script>
    let dbMaster = {}, dbDaily = {}, setLoc = new Set(), data = [];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    window.onload = () => {
        const cache = localStorage.getItem('wh_v814_data');
        const op = localStorage.getItem('wh_v814_op');
        if (cache) { data = JSON.parse(cache); render(); }
        if (op) document.getElementById('opName').value = op;
    };

    function playSound(type) {
        const g = audioCtx.createGain(); g.gain.setValueAtTime(0.06, audioCtx.currentTime);
        g.connect(audioCtx.destination);
        if(type === 'error') {
            [0, 150].forEach(t => {
                const o = audioCtx.createOscillator(); o.type='square'; o.frequency.value = 880;
                o.connect(g); o.start(audioCtx.currentTime + t/1000); o.stop(audioCtx.currentTime + (t+100)/1000);
            });
        } else if(type === 'warn') {
            const o = audioCtx.createOscillator(); o.type='square'; o.frequency.value = 440;
            o.connect(g); o.start(); o.stop(audioCtx.currentTime + 0.8);
        }
    }

    function loadSKU() {
        Papa.parse(document.getElementById('skuFile').files[0], { complete: (res) => {
            dbMaster = {};
            res.data.forEach((r, i) => { if(i>0 && r[0]) dbMaster[r[0].trim().toUpperCase()] = {b:r[1]||"", c:r[2]||""}; });
            document.getElementById('skuStat').innerText = "READY"; document.getElementById('skuStat').className="status ready";
        }});
    }

    function loadCheck() {
        Papa.parse(document.getElementById('checkFile').files[0], { complete: (res) => {
            dbDaily = {};
            res.data.forEach(r => { if(r[0]) dbDaily[r[0].trim().toUpperCase()] = parseFloat(r[1]) || 0; });
            document.getElementById('checkStat').innerText = "READY"; document.getElementById('checkStat').className="status ready";
        }});
    }

    function loadLoc() {
        Papa.parse(document.getElementById('locFile').files[0], { complete: (res) => {
            setLoc.clear(); const dl = document.getElementById('locList'); dl.innerHTML = "";
            res.data.forEach(r => r.forEach(c => { if(c && c.trim().length > 1) { let v = c.trim().toUpperCase(); setLoc.add(v); let o = document.createElement('option'); o.value = v; dl.appendChild(o); } }));
            document.getElementById('locStat').innerText = "READY"; document.getElementById('locStat').className="status ready";
        }});
    }

    function addEntry() {
        const sIn = document.getElementById('skuIn'), lIn = document.getElementById('locIn');
        const sv = sIn.value.trim().toUpperCase(), lv = lIn.value.trim().toUpperCase(), qv = parseFloat(document.getElementById('qtyIn').value);
        const op = document.getElementById('opName').value.trim();

        if(!sv || !lv || !op) { alert("Input Required!"); return; }

        let skuValid = true;
        if (Object.keys(dbDaily).length > 0) { if (!dbDaily[sv]) skuValid = false; }
        else if (Object.keys(dbMaster).length > 0) { if (!dbMaster[sv]) skuValid = false; }

        if (!skuValid) { sIn.classList.add('error-glow'); playSound('error'); return; }
        if (setLoc.size > 0 && !setLoc.has(lv)) { lIn.classList.add('error-glow'); playSound('error'); return; }

        sIn.classList.remove('error-glow'); lIn.classList.remove('error-glow');

        const alreadyGot = data.filter(d => d._originSKU === sv).reduce((sum, d) => sum + parseFloat(d.Quantity), 0);
        const planQty = dbDaily[sv] || 0;
        const isOver = Object.keys(dbDaily).length > 0 && planQty > 0 && (alreadyGot + qv) > planQty;
        if(isOver) playSound('warn');

        const m = dbMaster[sv];
        data.unshift({
            id: Date.now(), _originSKU: sv,
            "SKU": m ? m.b : sv, "Name": m ? m.c : "N/A", "Quantity": qv,
            "Location": "Patiki Warehouse: " + lv,
            "DateReceived": new Date().toISOString().slice(0,10).replace(/-/g, ""),
            "Status": isOver ? "OVER" : "OK"
        });

        render(); saveLocal();
        sIn.value = ""; lIn.value = ""; document.getElementById('qtyIn').value = "1"; sIn.focus();
    }

    function render() {
        const b = document.querySelector("#mainTable tbody"); b.innerHTML = "";
        data.forEach(d => {
            const rowClass = d.Status === "OVER" ? 'class="row-over"' : '';
            b.innerHTML += `<tr ${rowClass}><td><b>${d.SKU}</b></td><td>${d.Quantity}</td><td>${d.Location.replace('Patiki Warehouse: ', '')}</td><td><button style="background:#ff7875; color:white; border:none; padding:4px 8px; border-radius:4px;" onclick="del(${d.id})">DEL</button></td></tr>`;
        });
    }

    function del(id) { if(confirm("Delete?")) { data = data.filter(x => x.id !== id); render(); saveLocal(); } }
    function saveLocal() { localStorage.setItem('wh_v814_data', JSON.stringify(data)); localStorage.setItem('wh_v814_op', document.getElementById('opName').value); }
    
    function exportCsv() {
        if(!data.length) return;
        const op = document.getElementById('opName').value.trim() || "User";
        const dateStr = new Date().toISOString().slice(0,10);
        const csvRows = [["SKU", "Name", "BatchSerialNumber", "SupplierSKU", "ExpiryDate_YYYYMMDD", "Quantity", "Location", "DateReceived_YYYYMMDD", "Received"]];
        data.forEach(d => { csvRows.push([d.SKU, d.Name, "", "", "", d.Quantity, d.Location, d.DateReceived, "TRUE"]); });
        const csvContent = Papa.unparse(csvRows);
        const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.setAttribute("href", URL.createObjectURL(blob));
        link.setAttribute("download", `Putway_${op}_${dateStr}.csv`);
        link.click();
    }

    document.getElementById('skuIn').onkeyup = e => { if(e.key==='Enter') document.getElementById('qtyIn').focus(); };
    document.getElementById('qtyIn').onkeyup = e => { if(e.key==='Enter') document.getElementById('locIn').focus(); };
    document.getElementById('locIn').onkeyup = e => { if(e.key==='Enter') addEntry(); };
</script>
</body>
</html>
